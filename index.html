let _formStoreLinks=[];
function storeLinksHTML(){
  if(!_formStoreLinks.length) return `<div style="color:var(--muted);font-size:12px;margin-bottom:10px">No other store links added yet.</div>`;
  return _formStoreLinks.map((sl,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
      <input class="fi" style="flex:1" placeholder="Store name (e.g. Storinio, Furaha Deals)" value="${(sl.store||'').replace(/"/g,'&quot;')}" oninput="updStoreLink(${i},'store',this.value)">
      <input class="fi" style="flex:2" placeholder="https://..." value="${(sl.url||'').replace(/"/g,'&quot;')}" oninput="updStoreLink(${i},'url',this.value)">
      <button class="btn btn-ghost btn-xs" onclick="rmStoreLink(${i})" type="button" style="margin-top:4px">✕</button>
    </div>`).join('');
}
function addStoreLink(){ _formStoreLinks.push({store:'',url:''}); document.getElementById('storeLinksWrap').innerHTML=storeLinksHTML(); }
function rmStoreLink(i){ _formStoreLinks.splice(i,1); document.getElementById('storeLinksWrap').innerHTML=storeLinksHTML(); }
function updStoreLink(i,field,val){ if(_formStoreLinks[i]) _formStoreLinks[i][field]=val; }
function prevStatic(arr,pfx){ return arr.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">${arr.length} detected:</div>`+arr.map((a,i)=>`<div class="pp-item"><span class="pp-n">${pfx==='H'?'H'+String(i+1).padStart(2,'0'):'#'+(i+1)}</span>${escHtml(a)}</div>`).join(''):''; }
function prevA(){ const l=parseLines(document.getElementById('p_angles').value); document.getElementById('prevA').innerHTML=l.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">${l.length} angle(s) detected:</div>`+l.map((a,i)=>`<div class="pp-item"><span class="pp-n">#${i+1}</span>${escHtml(a)}</div>`).join(''):''; }
function prevH(){ const l=parseLines(document.getElementById('p_hooks').value); document.getElementById('prevH').innerHTML=l.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">${l.length} hook(s) detected:</div>`+l.map((h,i)=>`<div class="pp-item"><span class="pp-n">H${String(i+1).padStart(2,'0')}</span>${escHtml(h)}</div>`).join(''):''; }
function fImgSel(e){ Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{_formImgs.push(ev.target.result);fGrid();};r.readAsDataURL(f);}); }
function fImgDrop(e){ e.preventDefault(); fImgSel({target:{files:e.dataTransfer.files}}); }
function fGrid(){ document.getElementById('fimgs').innerHTML=_formImgs.map((s,i)=>`<div class="imw"><img src="${s}"><div class="x" onclick="rmFImg(${i})">✕</div></div>`).join(''); }
function rmFImg(i){ _formImgs.splice(i,1); fGrid(); }
async function saveProduct(editId){
  const name=document.getElementById('p_name').value.trim();
  const url=document.getElementById('p_url').value.trim();
  const cat=document.getElementById('p_cat').value.trim()||'General';
  const market=document.getElementById('p_market').value;
  const lang=document.getElementById('p_lang').value;
  const status=document.getElementById('p_status').value;
  const priority=document.getElementById('p_priority').value;
  const storeLinks=_formStoreLinks.filter(sl=>sl.store?.trim()||sl.url?.trim());
  const angles=parseLines(document.getElementById('p_angles').value);
  const hooks=parseLines(document.getElementById('p_hooks').value);
  if(!name||!url){ alert('Name and URL required.'); return; }
  if(editId==='null'||editId===null){
    const row={name,url,cat,market,lang,images:[..._formImgs],angles,hooks,raw_video:'',status,priority,store_links:storeLinks};
    const { data } = await sb.from('products').insert([row]).select().single();
    if(data) APP.products.push(rowToProduct(data));
    await logHistory('created','product',data?.id||0,`Added product "${name}" (${market}) — ${angles.length} angles, ${hooks.length} hooks, priority: ${priority}`);
  } else {
    const p=pr(editId);
    const upd={name,url,cat,market,lang,status,priority,images:[..._formImgs],store_links:storeLinks};
    if(angles.length)upd.angles=angles; if(hooks.length)upd.hooks=hooks;
    await sb.from('products').update(upd).eq('id',editId);
    p.name=name;p.url=url;p.cat=cat;p.market=market;p.lang=lang;p.status=status;p.priority=priority;p.images=[..._formImgs];p.storeLinks=storeLinks;
    if(angles.length)p.angles=angles; if(hooks.length)p.hooks=hooks;
    await logHistory('updated','product',editId,`Edited product "${name}" — status: ${status}, priority: ${priority}`);
  }
  _formImgs=[]; _formStoreLinks=[]; closeM2(); APP.page='products'; render();
}
async function delProduct(id){
  if(!confirm('Delete this product?'))return;
  const name=pr(id)?.name||'product';
  APP.products=APP.products.filter(p=>p.id!==id);
  // Remove from all users' product lists
  for(const u of Object.values(APP.users)){
    if((u.products||[]).includes(id)){
      u.products=u.products.filter(i=>i!==id);
      await sb.from('users').update({products:u.products}).eq('id',u.id);
    }
  }
  await sb.from('products').delete().eq('id',id);
  await logHistory('deleted','product',id,`Deleted product "${name}"`);
  closeM2(); render();
}

function openM1(){ document.getElementById('mo1').classList.add('open'); }
function closeM1(){ document.getElementById('mo1').classList.remove('open'); }
function openM2(){ document.getElementById('mo2').classList.add('open'); }
function closeM2(){ document.getElementById('mo2').classList.remove('open'); _formImgs=[]; }
function go(p){ APP.page=p; APP.tab='all'; render(); }
document.getElementById('mo1').addEventListener('click',function(e){ if(e.target===this)closeM1(); });
document.getElementById('mo2').addEventListener('click',function(e){ if(e.target===this)closeM2(); });

(async function init(){
  try {
    await loadAllData();
    await new Promise(r=>setTimeout(r,250));
    hideLoader();
    renderAuth();
  } catch(err){
    console.error('Supabase init error:', err);
    document.getElementById('loadMsg').textContent='Connection error — reload to try again';
    document.getElementById('loadMsg').style.color='#F87171';
  }
})();
