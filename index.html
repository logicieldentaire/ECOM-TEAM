<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcomTeamAfrica — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════ PROFESSIONAL DESIGN SYSTEM ════════
   ONE accent (blue). Slate neutrals. Semantic colors used sparingly. */
:root {
  /* Brand / structure */
  --ink:        #0F172A;   /* near-black slate — sidebar, headings */
  --ink-2:      #1E293B;
  --accent:     #2563EB;   /* the ONLY decorative color */
  --accent-d:   #1D4ED8;
  --accent-bg:  #EFF4FF;

  /* Neutral slate scale */
  --s50:  #F8FAFC;
  --s100: #F1F5F9;
  --s200: #E2E8F0;
  --s300: #CBD5E1;
  --s400: #94A3B8;
  --s500: #64748B;
  --s600: #475569;
  --s700: #334155;

  --bg:     #F6F8FB;
  --card:   #FFFFFF;
  --border: #E7EBF0;

  --text:   #0F172A;
  --sub:    #475569;
  --muted:  #8A97A8;

  /* Semantic — used ONLY for status meaning */
  --ok:     #15803D;  --ok-bg:   #F0FAF3;  --ok-bd:  #BBE9C8;
  --warn:   #B45309;  --warn-bg: #FEF8EF;  --warn-bd:#F4DEB0;
  --bad:    #B91C1C;  --bad-bg:  #FEF4F4;  --bad-bd: #F3CBCB;

  --r: 8px; --r-lg: 12px;
  --sh: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --sh-md: 0 4px 12px rgba(15,23,42,.08);
  --sw: 232px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; font-size: 14px; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--s300); border-radius: 3px; }
a { color: var(--accent); }

/* ─── AUTH ─── */
.auth { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ink); }
.auth-card { background: #fff; border-radius: 16px; padding: 44px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.auth-logo { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 6px; }
.auth-mark { width: 38px; height: 38px; border-radius: 9px; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; }
.auth-title { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -.4px; }
.auth-sub { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 28px; }
.auth-err { background: var(--bad-bg); color: var(--bad); padding: 10px 13px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid var(--bad-bd); }
.auth-field { margin-bottom: 15px; }
.auth-label { display: block; font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
.auth-input { width: 100%; padding: 11px 13px; border: 1px solid var(--s300); border-radius: 9px; font-size: 14px; font-family: inherit; outline: none; transition: border .15s, box-shadow .15s; }
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.auth-btn { width: 100%; padding: 12px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: var(--accent); color: #fff; transition: background .15s; margin-top: 6px; font-family: inherit; }
.auth-btn:hover { background: var(--accent-d); }

/* ─── LAYOUT ─── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ─── SIDEBAR ─── */
.sb { width: var(--sw); min-width: var(--sw); background: var(--ink); display: flex; flex-direction: column; overflow: hidden; transition: width .2s, min-width .2s; }
.sb.col { width: 60px; min-width: 60px; }
.sb-logo { padding: 18px 16px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; gap: 10px; min-height: 62px; }
.sb-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.sb-name { font-size: 14.5px; font-weight: 700; color: #fff; letter-spacing: -.3px; line-height: 1.1; }
.sb-name span { display: block; font-size: 9px; font-weight: 500; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.sb.col .sb-name, .sb.col .sb-uinfo, .sb.col .nav-t, .sb.col .nav-badge { display: none; }
.sb.col .sb-user { justify-content: center; padding: 10px 0; }
.sb.col .nav-i { justify-content: center; padding: 10px; }

.sb-user { display: flex; align-items: center; gap: 9px; margin: 10px 9px 0; padding: 9px 11px; background: rgba(255,255,255,.06); border-radius: 9px; }
.av { border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; flex-shrink: 0; }
.sb-uinfo { min-width: 0; }
.sb-uname { font-size: 12.5px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-urole { font-size: 10px; color: rgba(255,255,255,.42); text-transform: capitalize; }

.nav-s { padding: 15px 14px 5px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.nav-i { display: flex; align-items: center; gap: 10px; padding: 8px 14px; margin: 1px 8px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,.62); font-size: 13px; font-weight: 500; border: none; background: none; width: calc(100% - 16px); text-align: left; transition: all .13s; white-space: nowrap; position: relative; }
.nav-i:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-i.on { background: var(--accent); color: #fff; font-weight: 600; }
.nav-ico { width: 18px; text-align: center; flex-shrink: 0; font-size: 15px; }
.nav-t { flex: 1; }
.nav-badge { background: rgba(255,255,255,.18); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 9px; min-width: 18px; text-align: center; }
.nav-i.on .nav-badge { background: rgba(255,255,255,.25); }
.sb.col .nav-i:hover::after { content: attr(data-t); position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%); background: var(--ink-2); color: #fff; padding: 4px 9px; border-radius: 6px; font-size: 12px; white-space: nowrap; z-index: 60; box-shadow: var(--sh-md); }

.sb-spacer { flex: 1; }
.sb-logout { display: flex; align-items: center; gap: 10px; padding: 8px 14px; margin: 1px 8px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,.42); font-size: 12px; border: none; background: none; width: calc(100% - 16px); transition: all .13s; }
.sb-logout:hover { color: #fff; background: rgba(255,255,255,.06); }
.col-btn { padding: 9px; cursor: pointer; color: rgba(255,255,255,.3); border: none; border-top: 1px solid rgba(255,255,255,.07); background: none; width: 100%; font-size: 14px; transition: color .13s; }
.col-btn:hover { color: rgba(255,255,255,.7); }

/* ─── MAIN ─── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.top { display: flex; align-items: center; justify-content: space-between; padding: 13px 26px; background: #fff; border-bottom: 1px solid var(--border); gap: 14px; flex-shrink: 0; }
.top-t { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -.3px; }
.top-s { font-size: 12px; color: var(--muted); margin-top: 1px; }
.top-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.page { padding: 22px 26px; overflow-y: auto; flex: 1; }

/* ─── KPI ─── */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin-bottom: 22px; }
.kpi { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px 18px; }
.kpi-l { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.kpi-v { font-size: 26px; font-weight: 800; color: var(--ink); letter-spacing: -.6px; line-height: 1; }
.kpi-s { font-size: 11px; color: var(--muted); margin-top: 5px; }
.kpi-pos { color: var(--ok); } .kpi-neg { color: var(--bad); } .kpi-warn { color: var(--warn); }
.bar { height: 4px; background: var(--s200); border-radius: 2px; margin-top: 9px; overflow: hidden; }
.bar > div { height: 100%; border-radius: 2px; background: var(--accent); transition: width .4s; }
.bar.ok > div { background: var(--ok); } .bar.warn > div { background: var(--warn); }

/* ─── CARD ─── */
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.card-h { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.card-t { font-size: 13.5px; font-weight: 700; color: var(--ink); }
.card-b { padding: 18px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ─── CHIP (muted, single-tone) ─── */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
.chip-n  { background: var(--s100); color: var(--s600); }          /* neutral */
.chip-ok { background: var(--ok-bg);  color: var(--ok);  border-color: var(--ok-bd); }
.chip-w  { background: var(--warn-bg);color: var(--warn);border-color: var(--warn-bd); }
.chip-b  { background: var(--bad-bg); color: var(--bad); border-color: var(--bad-bd); }
.chip-a  { background: var(--accent-bg); color: var(--accent-d); }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* ─── BUTTONS ─── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all .14s; font-family: inherit; white-space: nowrap; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-pri { background: var(--accent); color: #fff; }
.btn-pri:hover:not(:disabled) { background: var(--accent-d); }
.btn-out { background: #fff; color: var(--ink); border-color: var(--s300); }
.btn-out:hover:not(:disabled) { background: var(--s50); border-color: var(--s400); }
.btn-ghost { background: transparent; color: var(--sub); border-color: var(--border); }
.btn-ghost:hover { background: var(--s50); }
.btn-ok { background: var(--ok); color: #fff; }
.btn-ok:hover:not(:disabled) { background: #166534; }
.btn-bad { background: var(--bad); color: #fff; }
.btn-bad:hover:not(:disabled) { background: #991B1B; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-xs { padding: 4px 9px; font-size: 11px; border-radius: 6px; }

/* ─── FORM ─── */
.fg { margin-bottom: 15px; }
.fl { display: block; font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
.fl .rq { color: var(--bad); }
.fi { width: 100%; padding: 9px 12px; border: 1px solid var(--s300); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border .14s, box-shadow .14s; color: var(--text); background: #fff; }
.fi:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.fi:disabled { background: var(--s50); color: var(--muted); }
select.fi { cursor: pointer; }
textarea.fi { resize: vertical; min-height: 70px; line-height: 1.55; }

/* ─── TABLE ─── */
.tw { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; background: var(--s50); border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr.clickable { cursor: pointer; }
tbody tr.clickable:hover td { background: var(--s50); }

/* ─── TABS ─── */
.tabs { display: inline-flex; gap: 2px; padding: 3px; background: var(--s100); border-radius: 9px; margin-bottom: 18px; }
.tab { padding: 6px 15px; border-radius: 7px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--muted); border: none; background: none; transition: all .14s; font-family: inherit; }
.tab.on { background: #fff; color: var(--ink); box-shadow: var(--sh); }

/* ─── WEEK SELECTOR ─── */
.weeks { display: flex; gap: 4px; flex-wrap: wrap; }
.wk { padding: 5px 11px; border-radius: 7px; border: 1px solid var(--s300); background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--sub); transition: all .14s; font-family: inherit; }
.wk:hover { border-color: var(--accent); color: var(--accent); }
.wk.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* ─── MODAL ─── */
.mo { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .18s; }
.mo.open { opacity: 1; pointer-events: all; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,.22); transform: translateY(6px); transition: transform .18s; }
.modal.wide { max-width: 760px; }
.mo.open .modal { transform: translateY(0); }
.mh { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 2; }
.mt { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
.ms { font-size: 12px; color: var(--muted); margin-top: 2px; }
.mb { padding: 22px; }
.mf { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 9px; background: #fff; position: sticky; bottom: 0; }

/* ─── ALERT ─── */
.al { padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: flex; gap: 9px; align-items: flex-start; line-height: 1.5; border: 1px solid; }
.al-i { background: var(--accent-bg); color: var(--accent-d); border-color: #D5E2FB; }
.al-w { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-bd); }
.al-ok{ background: var(--ok-bg);  color: var(--ok);  border-color: var(--ok-bd); }
.al-b { background: var(--bad-bg); color: var(--bad); border-color: var(--bad-bd); }
.al i { font-style: normal; flex-shrink: 0; }

.divider { height: 1px; background: var(--border); margin: 18px 0; }
.sec-t { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.sec-n { width: 20px; height: 20px; border-radius: 5px; background: var(--ink); color: #fff; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }

/* ─── RESULT TOGGLE ─── */
.rtog { display: flex; gap: 8px; }
.rtog button { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--s300); background: #fff; color: var(--sub); transition: all .14s; font-family: inherit; }
.rtog button.w.on { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok); }
.rtog button.l.on { background: var(--bad-bg); border-color: var(--bad-bd); color: var(--bad); }
.rtog button.p.on { background: var(--s100); border-color: var(--s300); color: var(--s600); }

/* ─── IMG UPLOAD ─── */
.drop { border: 1.5px dashed var(--s300); border-radius: 10px; padding: 26px 18px; text-align: center; cursor: pointer; transition: all .16s; background: var(--s50); }
.drop:hover, .drop.over { border-color: var(--accent); background: var(--accent-bg); }
.drop input { display: none; }
.imgs { display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 8px; margin-top: 12px; }
.imw { position: relative; }
.imw img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
.imw .x { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: var(--bad); color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; }

/* ─── PASTE PREVIEW ─── */
.pp-item { display: flex; gap: 8px; padding: 7px 10px; border-radius: 7px; margin-bottom: 4px; font-size: 12px; line-height: 1.5; background: var(--s50); border: 1px solid var(--border); }
.pp-n { font-size: 10px; font-weight: 700; color: var(--accent); min-width: 26px; flex-shrink: 0; padding-top: 1px; }

/* ─── PRODUCT CARD ─── */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr)); gap: 13px; }
.pcard { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; cursor: pointer; transition: all .15s; }
.pcard:hover { border-color: var(--s300); box-shadow: var(--sh-md); }
.pcard-img { width: 100%; height: 130px; object-fit: cover; background: var(--s100); display: flex; align-items: center; justify-content: center; font-size: 34px; color: var(--s400); }
.pcard-img img { width: 100%; height: 100%; object-fit: cover; }
.pcard-b { padding: 13px 15px; }
.pcard-n { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.pcard-u { font-size: 11px; color: var(--accent); margin-bottom: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pcard-a { font-size: 11px; color: var(--sub); padding: 6px 9px; background: var(--s50); border-radius: 7px; margin-bottom: 9px; line-height: 1.5; }

/* ─── USER CARD ─── */
.ucard { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; }
.uhead { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 18px; background: var(--s100); color: var(--s600); font-size: 11px; font-weight: 600; margin: 2px; }
.tag .x { cursor: pointer; opacity: .5; }
.tag .x:hover { opacity: 1; color: var(--bad); }
.tag-add { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 18px; border: 1px dashed var(--s300); color: var(--muted); font-size: 11px; cursor: pointer; background: none; margin: 2px; font-family: inherit; }
.tag-add:hover { border-color: var(--accent); color: var(--accent); }

.stat { text-align: center; padding: 11px; background: var(--s50); border-radius: 9px; }
.stat-v { font-size: 20px; font-weight: 800; color: var(--ink); }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .3px; }

/* ─── EMPTY ─── */
.empty { text-align: center; padding: 44px 20px; color: var(--muted); }
.empty-i { font-size: 36px; margin-bottom: 10px; opacity: .5; }
.empty-t { font-size: 14px; font-weight: 600; color: var(--sub); }

/* ─── TOGGLE ─── */
.tog { width: 38px; height: 21px; background: var(--s300); border-radius: 11px; cursor: pointer; position: relative; border: none; transition: background .18s; flex-shrink: 0; }
.tog.on { background: var(--accent); }
.tog::after { content: ''; position: absolute; top: 2.5px; left: 2.5px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left .18s; }
.tog.on::after { left: 19.5px; }
.prow { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.prow:last-child { border-bottom: none; }

/* ─── SELECT PILL (dashboard user picker) ─── */
.upick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
.upill { display: flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 9px; border: 1px solid var(--s300); background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--sub); transition: all .14s; }
.upill:hover { border-color: var(--accent); }
.upill.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* ─── PILL SMALL inline ─── */
.late { color: var(--bad); font-weight: 600; }
.ontime { color: var(--ok); font-weight: 600; }

@media (max-width: 820px) { .kpis { grid-template-columns: 1fr 1fr; } .g2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="auth"></div>
<div class="app" id="app" style="display:none"></div>
<div class="mo" id="mo1"><div class="modal" id="md1"></div></div>
<div class="mo" id="mo2"><div class="modal wide" id="md2"></div></div>
<div id="loadingOverlay" style="position:fixed;inset:0;background:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px">

// ─── Real-date helpers ───
// IMPORTANT: always use LOCAL date components, never toISOString() (which shifts to UTC
// and silently rolls the date backward/forward by a day depending on timezone).
function toYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayYMD(){ return toYMD(new Date()); }
function isoWeek(d){
  const tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  tmp.setUTCDate(tmp.getUTCDate()+4-(tmp.getUTCDay()||7));
  const y0=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  return Math.ceil((((tmp-y0)/86400000)+1)/7);
}
function dayName(d){ return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]; }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return toYMD(d); }
// Resolve a {mode, from, to} filter object into a concrete [from,to] date range (YYYY-MM-DD)
function resolveDateFilter(f){
  const today=todayYMD();
  if(f.mode==='today') return { from: today, to: today };
  if(f.mode==='week'){
    const ws=weekStartOf(today);
    const we=new Date(ws+'T00:00:00'); we.setDate(we.getDate()+6);
    return { from: ws, to: toYMD(we) };
  }
  if(f.mode==='custom') return { from: f.from||null, to: f.to||null };
  return { from: null, to: null };
}
function weekStartOf(ymd){
  const d=new Date(ymd+'T00:00:00');
  const diff=d.getDay()-1;
  d.setDate(d.getDate()-(diff<0?6:diff));
  return toYMD(d);
}

function fmtDateTime(iso){ if(!iso)return '—'; const d=new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

function isLate(t){
  if(!t.deadlineDate) return null;
  const upl = taskLatestUpload(t);
  if(!upl) return null;
  // deadlineDate is stored as YYYY-MM-DD (plain date, no timezone)
  // uploadedAt is an ISO timestamp — extract its LOCAL date for comparison
  const deadlineYMD = (t.deadlineDate||'').slice(0,10);
  if(!deadlineYMD) return null;
  const uplDate = toYMD(new Date(upl)); // convert upload timestamp to local YYYY-MM-DD
  if(uplDate < deadlineYMD) return false; // uploaded before deadline day = on time
  if(uplDate > deadlineYMD) return true;  // uploaded after deadline day = late
  // Same day — on time (upload was on the deadline day itself)
  return false;
}

// ─── Variant helpers (a task can have 1–4 hook variants sharing one angle) ───
function taskLatestUpload(t){
  if(!t.variants||!t.variants.length) return t.uploadedAt||null; // backward-compat
  const ups = t.variants.map(v=>v.uploadedAt).filter(Boolean);
  return ups.length ? ups.sort().slice(-1)[0] : null;
}
function taskUploadedCount(t){
  if(!t.variants) return t.uploadedAt?1:0;
  return t.variants.filter(v=>v.uploadedAt).length;
}
function taskWinnerCount(t){ return (t.variants||[]).filter(v=>v.adResult==='winner').length; }
function taskLoserCount(t){ return (t.variants||[]).filter(v=>v.adResult==='loser').length; }
function taskHasWinner(t){ return taskWinnerCount(t)>0; }
function taskHasFeedback(t){
  return t.variants&&t.variants.some(v=>v.mbFeedback||v.revisionFeedback);
}
function taskOverallResult(t){
  if(!t.variants||!t.variants.length) return t.mbResult||'pending';
  const varWithVideo = t.variants.filter(v=>v.videoLink);
  if(!varWithVideo.length) return 'pending';
  if(varWithVideo.every(v=>v.mbResult==='approved')) return 'approved';
  if(varWithVideo.some(v=>v.mbResult==='needs_revision')) return 'in_revision';
  if(varWithVideo.every(v=>!v.mbResult||v.mbResult==='pending')) return 'pending';
  // legacy winner/loser support
  if(varWithVideo.some(v=>v.mbResult==='winner')) return 'winner';
  if(varWithVideo.every(v=>v.mbResult==='loser')) return 'loser';
  return 'pending';
}

// VE pointage stats (optionally filtered by date range [from,to] on taskDate)
function veStats(veId, from=null, to=null){
  let ts = APP.tasks.filter(t=>t.assignedVE===veId);
  if(from) ts = ts.filter(t=>t.taskDate>=from);
  if(to)   ts = ts.filter(t=>t.taskDate<=to);
  const done = ts.filter(t=>t.status==='done');
  const uploaded = ts.filter(t=>taskUploadedCount(t)>0);
  const late = uploaded.filter(t=>isLate(t)===true).length;
  const onTime = uploaded.filter(t=>isLate(t)===false).length;
  const revisions = ts.filter(t=>t.status==='in_revision').length;
  const winners = ts.filter(t=>taskHasWinner(t)).length;
  const totalVideos = ts.reduce((s,t)=>s+(t.variants?t.variants.length:1),0);
  const total = ts.length;
  const dlRespect = uploaded.length ? Math.round(onTime/uploaded.length*100) : 0;
  return { total, totalVideos, done:done.length, uploaded:uploaded.length, late, onTime, revisions, winners, dlRespect };
}
// MB stats (optionally filtered by date range on report date / taskDate)
function mbStats(mbId, from=null, to=null){
  let ts = APP.tasks.filter(t=>t.assignedMB===mbId);
  if(from) ts = ts.filter(t=>t.taskDate>=from);
  if(to)   ts = ts.filter(t=>t.taskDate<=to);
  let reps = APP.reports.filter(r=>r.mbId===mbId);
  if(from) reps = reps.filter(r=>r.date>=from);
  if(to)   reps = reps.filter(r=>r.date<=to);
  const totalSpend = reps.reduce((s,r)=>s+r.spend,0);
  const totalLeads = reps.reduce((s,r)=>s+r.leads,0);
  const avgCpl = totalLeads ? +(totalSpend/totalLeads).toFixed(2) : 0;
  const winners = ts.filter(t=>taskHasWinner(t)).length;
  const losers = ts.filter(t=>taskOverallResult(t)==='loser').length;
  const reviewed = winners+losers;
  const winRate = reviewed ? Math.round(winners/reviewed*100) : 0;
  return { totalSpend, totalLeads, avgCpl, winners, losers, winRate, reportCount: reps.length, tasks: ts.length };
}

    <div class="sb-logo"><div class="sb-mark">ET</div><div class="sb-name">EcomTeamAfrica<span>Operations</span></div></div>
    <div class="sb-user">${av(APP.me,32)}<div class="sb-uinfo"><div class="sb-uname">${me.name}</div><div class="sb-urole">${me.role.replace('_',' ')}</div></div></div>
    <div class="nav-s">Menu</div>
    ${nav}
    <div class="sb-spacer"></div>
    <button class="sb-logout" onclick="logout()"><span class="nav-ico">⏻</span><span class="nav-t">Sign out</span></button>
    <button class="col-btn" onclick="APP.collapsed=!APP.collapsed;render()">${APP.collapsed?'»':'«'}</button>

      <div><div class="top-t">${titles[APP.page]||''}</div><div class="top-s">${subs[APP.page]||''}</div></div>
      <div class="top-r">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--muted)">${me.name}</span>${av(APP.me,32)}</div>
      </div>

}

function renderPage(){
  switch(APP.page){
    case 'dashboard': return pgDash();
    case 'tasks':     return pgTasks();
    case 'pointage':  return pgPointage();
    case 'reports':   return pgReports();
    case 'products':  return pgProducts();
    case 'testproducts': return pgTestProducts();
    case 'stats': return pgStats();
    case 'history': return pgHistory();
    case 'team':      return pgTeam();
    default:          return pgDash();
  }
}

// ══════════════════════════════════════════════════════════
// WEEKLY TASKS  (TABLE view)
// ══════════════════════════════════════════════════════════
function pgTasks(){
  const me=u();
  const today=todayYMD();
  if(!APP.tasksFilter) APP.tasksFilter={mode:'week',offset:0,from:'',to:''};
  const tf=APP.tasksFilter;

  // Resolve the active range based on mode
  let rangeStart, rangeEnd, dayList; // dayList: array of {ymd,label} to render as grouped rows (only for week-like modes)
  if(tf.mode==='today'){
    rangeStart=today; rangeEnd=today;
    dayList=[{ ymd: today, label: dayName(new Date(today+'T00:00:00')) }];
  } else if(tf.mode==='nextweek'){
    const ws=weekStartOf(today);
    const nws=new Date(ws+'T00:00:00'); nws.setDate(nws.getDate()+7);
    rangeStart=toYMD(nws);
    dayList=[];
    for(let i=0;i<6;i++){ const d=new Date(nws); d.setDate(nws.getDate()+i); dayList.push({ymd:toYMD(d), label:DAYS[i]}); }
    rangeEnd=dayList[dayList.length-1].ymd;
  } else if(tf.mode==='custom'){
    rangeStart=tf.from||today; rangeEnd=tf.to||today;
    dayList=[];
    let cur=new Date(rangeStart+'T00:00:00');
    const end=new Date(rangeEnd+'T00:00:00');
    let guard=0;
    while(cur<=end && guard<60){ dayList.push({ymd:toYMD(cur), label:dayName(cur)}); cur.setDate(cur.getDate()+1); guard++; }
  } else { // 'week' — default, current week
    const ws=weekStartOf(today);
    dayList=[];
    for(let i=0;i<6;i++){ const d=new Date(ws+'T00:00:00'); d.setDate(d.getDate()+i); dayList.push({ymd:toYMD(d), label:DAYS[i]}); }
    rangeStart=ws; rangeEnd=dayList[dayList.length-1].ymd;
  }

  const isMB=me.role==='media_buyer';
  const rangeT = myTasks().filter(t=>t.taskDate>=rangeStart&&t.taskDate<=rangeEnd);

  const tabs = isMB ? [
    {id:'all',l:`All (${rangeT.length})`},
    {id:'pending',l:`To review (${rangeT.filter(t=>t.status==='done'&&taskOverallResult(t)==='pending').length})`},
    {id:'revision',l:`Revision (${rangeT.filter(t=>t.status==='in_revision').length})`},
    {id:'done',l:`Closed (${rangeT.filter(t=>taskOverallResult(t)!=='pending').length})`},
  ] : [
    {id:'all',l:`All (${rangeT.length})`},
    {id:'in_revision',l:`Revision (${rangeT.filter(t=>t.status==='in_revision').length})`},
    {id:'in_progress',l:`In progress (${rangeT.filter(t=>t.status==='in_progress').length})`},
    {id:'done',l:`Done (${rangeT.filter(t=>t.status==='done').length})`},
    {id:'pending',l:`Pending (${rangeT.filter(t=>t.status==='pending').length})`},
  ];

  // Filter tasks by selected tab
  function applyTab(list){
    if(APP.tab==='all') return list;
    if(isMB){
      if(APP.tab==='pending') return list.filter(t=>t.status==='done'&&taskOverallResult(t)==='pending');
      if(APP.tab==='revision') return list.filter(t=>t.status==='in_revision');
      if(APP.tab==='done') return list.filter(t=>taskOverallResult(t)!=='pending');
    } else return list.filter(t=>t.status===APP.tab);
    return list;
  }

  // Build table rows grouped by day with colored separator rows
  const rows = dayList.map(({ymd, label})=>{
    const dt = applyTab(myTasks().filter(t=>t.taskDate===ymd));
    const allDt = myTasks().filter(t=>t.taskDate===ymd);
    const isToday = ymd===today;
    const isPast  = ymd<today;
    const doneCnt = allDt.filter(t=>t.status==='done').length;

    // Day separator row — accent blue for today, slate for other days, dimmed for past
    const sepBg   = isToday ? 'var(--accent)'   : isPast ? 'var(--s200)' : 'var(--ink)';
    const sepColor= isToday ? '#fff'             : isPast ? 'var(--s500)' : '#fff';
    const sepLabel= isToday ? `${label} — TODAY` : `${label} · ${fmtDate(ymd)}`;
    const badge   = allDt.length ? `<span style="background:rgba(255,255,255,.2);padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600">${doneCnt}/${allDt.length} done</span>` : '';

    const sep = `<tr><td colspan="12" style="background:${sepBg};color:${sepColor};padding:9px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-top:2px solid ${sepBg}">${sepLabel}&nbsp;&nbsp;${badge}</td></tr>`;

    if(!dt.length){
      return sep + `<tr><td colspan="12" style="padding:10px 16px;color:var(--muted);font-size:12px">No tasks${APP.tab!=='all'?' matching this filter':''}</td></tr>`;
    }

    return sep + dt.map(t=>{
      const p=pr(t.productId)||APP.testProducts.find(x=>x.id===t.testProductId);
      const late=isLate(t);
      const market = p?.market || t.testMarket || '—';
      const nVar = t.variants?t.variants.length:1;
      const upl = taskLatestUpload(t);
      return `<tr class="clickable" onclick="openTask(${t.id})">
        <td><b>${p?.name||t.testProductName||'—'}</b>${t.isTest?` <span class="chip chip-w" style="font-size:9px">TEST</span>`:''}${nVar>1?` <span class="chip chip-a" style="font-size:9px">${nVar} hooks</span>`:''}${t.mbNote?` <span class="chip chip-w" style="font-size:9px" title="${t.mbNote.replace(/"/g,'&quot;')}">📌</span>`:''}<div style="font-size:11px;color:var(--muted)">${t.angle.slice(0,40)}${t.angle.length>40?'…':''}</div></td>
        <td><span class="chip chip-n" style="font-size:10px">${market}</span></td>
        <td>${chip(t.campaignType,'n')}</td>
        <td style="font-size:11px;color:var(--sub);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.videoType}</td>
        <td style="font-size:11px;color:var(--sub);max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.voiceOver}</td>
        <td>${av(t.assignedVE,24)}</td>
        <td>${sChip(t.status)}</td>
        <td style="white-space:nowrap">${upl?fmtDateTime(upl):'<span style="color:var(--muted)">—</span>'}</td>
        <td>${late===true?'<span class="late">Late</span>':late===false?'<span class="ontime">On time</span>':'<span style="color:var(--muted)">—</span>'}</td>
        <td>${taskHasFeedback(t)?chip('Feedback given','ok'):'<span style="color:var(--muted)">—</span>'}</td>
        <td>${taskOverallResult(t)!=='pending'?sChip(taskOverallResult(t)):'<span style="color:var(--muted)">—</span>'}</td>
        <td><button class="btn btn-out btn-xs" onclick="event.stopPropagation();openTask(${t.id})">Open</button></td>
      </tr>`;
    }).join('');
  }).join('');

  const rangeLabel = tf.mode==='today' ? `Today — ${fmtDate(today)}`
    : tf.mode==='nextweek' ? `Next week — ${fmtDate(rangeStart)} to ${fmtDate(rangeEnd)}`
    : tf.mode==='custom' ? `${fmtDate(rangeStart)} to ${fmtDate(rangeEnd)}`
    : `This week — ${fmtDate(rangeStart)} to ${fmtDate(rangeEnd)}`;

  const filterBar = `
  <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px">
    <button class="upill ${tf.mode==='today'?'on':''}" onclick="setTasksFilterMode('today')" type="button">Today</button>
    <button class="upill ${tf.mode==='week'?'on':''}" onclick="setTasksFilterMode('week')" type="button">This week</button>
    <button class="upill ${tf.mode==='nextweek'?'on':''}" onclick="setTasksFilterMode('nextweek')" type="button">Next week</button>
    <button class="upill ${tf.mode==='custom'?'on':''}" onclick="setTasksFilterMode('custom')" type="button">Custom</button>
    ${tf.mode==='custom'?`
      <input type="date" class="fi" style="width:auto;padding:5px 9px;font-size:12px" value="${tf.from}" onchange="APP.tasksFilter.from=this.value;render()">
      <span style="color:var(--muted);font-size:12px">to</span>
      <input type="date" class="fi" style="width:auto;padding:5px 9px;font-size:12px" value="${tf.to}" onchange="APP.tasksFilter.to=this.value;render()">
    `:''}
  </div>`;

  return `
  ${filterBar}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div style="font-size:13px;font-weight:600;color:var(--sub)">${rangeLabel}</div>
    ${isMB?`<button class="btn btn-pri btn-sm" onclick="openTaskCreate()">+ Assign Task</button>`:''}
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="tab ${APP.tab===t.id?'on':''}" onclick="APP.tab='${t.id}';render()">${t.l}</button>`).join('')}</div>
  <div class="card"><div class="tw"><table>
    <thead><tr><th>Product / Angle</th><th>Market</th><th>Campaign</th><th>Format</th><th>Voice</th><th>Editor</th><th>Status</th><th>Uploaded</th><th>Deadline</th><th>Feedback</th><th>Result</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}
function setTasksFilterMode(mode){
  if(!APP.tasksFilter) APP.tasksFilter={mode:'week',offset:0,from:'',to:''};
  APP.tasksFilter.mode=mode;
  render();
}

function pgPointage(){
  const ves = Object.values(APP.users).filter(x=>x.role==='video_editor');
  if(APP.pointageFilter===undefined) APP.pointageFilter='';
  const filterBar = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <input type="date" class="fi" style="width:auto;padding:6px 10px;font-size:12px" value="${APP.pointageFilter}" onchange="APP.pointageFilter=this.value;render()">
      ${APP.pointageFilter?`<button class="btn btn-ghost btn-sm" onclick="APP.pointageFilter='';render()">Clear ✕</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="APP.pointageFilter='${todayYMD()}';render()">Today</button>
      <button class="btn btn-ghost btn-sm" onclick="APP.pointageFilter='${yesterdayYMD()}';render()">Yesterday</button>
    </div>`;
  return filterBar + `
  <div class="al al-i"><i>◷</i><div>Pointage tracks <b>when</b> each video editor uploaded each hook variant vs the task deadline. Uploaded after 23:59 of the deadline day counts as <b>late</b>.</div></div>
  ${ves.map(ve=>{
    const s=veStats(ve.id, APP.pointageFilter||null, APP.pointageFilter||null);
    let ts=APP.tasks.filter(t=>t.assignedVE===ve.id&&taskUploadedCount(t)>0);
    if(APP.pointageFilter) ts=ts.filter(t=>t.taskDate===APP.pointageFilter);
    ts=ts.sort((a,b)=>new Date(taskLatestUpload(b))-new Date(taskLatestUpload(a)));
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-h">
        <div style="display:flex;align-items:center;gap:11px">${av(ve.id,34)}<div><div style="font-size:14px;font-weight:700">${ve.name}</div><div style="font-size:11px;color:var(--muted)">Video Editor</div></div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="chip chip-ok">${s.onTime} on time</span>
          <span class="chip chip-b">${s.late} late</span>
          <span class="chip chip-a">${s.dlRespect}% respected</span>
        </div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>Product</th><th>Hooks</th><th>Date</th><th>Deadline</th><th>Last upload</th><th>On time?</th></tr></thead>
        <tbody>
          ${ts.length?ts.map(t=>{
            const late=isLate(t);
            const upl=taskLatestUpload(t);
            const nVar=t.variants?t.variants.length:1;
            const uploadedVar=taskUploadedCount(t);
            return `<tr class="clickable" onclick="openTask(${t.id})">
            <td><b>${pr(t.productId)?.name||t.testProductName||'—'}</b></td>
            <td><span class="chip chip-n" style="font-size:10px">${uploadedVar}/${nVar} uploaded</span></td>
            <td>${fmtDate(t.taskDate)}</td>
            <td>${fmtDate(t.deadlineDate)}</td>
            <td>${fmtDateTime(upl)}</td>
            <td>${late?'<span class="late">● Late</span>':'<span class="ontime">● On time</span>'}</td>
          </tr>`;}).join(''):`<tr><td colspan="6"><div class="empty" style="padding:24px"><div class="empty-t" style="font-size:13px">No uploads${APP.pointageFilter?' on this date':' yet'}</div></div></td></tr>`}
        </tbody>
      </table></div>
    </div>`;
  }).join('')}`;
}

function pgReports(){
  const me=u();
  const isMB=me.role==='media_buyer';
  const mbs = isMB ? [me] : Object.values(APP.users).filter(x=>x.role==='media_buyer');
  const monthKey = todayYMD().slice(0,7);
  // Filter state stored in APP.reportFilter (null = all)
  if(!APP.reportFilter) APP.reportFilter = '';

  const filterBar = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px">Filter by date</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" class="fi" style="width:auto;padding:6px 10px;font-size:12px" id="rf_date" value="${APP.reportFilter}"
            onchange="APP.reportFilter=this.value;render()">
          ${APP.reportFilter?`<button class="btn btn-ghost btn-sm" onclick="APP.reportFilter='';render()">Clear ✕</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="APP.reportFilter='${todayYMD()}';render()">Today</button>
          <button class="btn btn-ghost btn-sm" onclick="APP.reportFilter='${yesterdayYMD()}';render()">Yesterday</button>
        </div>
      </div>
      ${isMB?`<button class="btn btn-pri btn-sm" onclick="openReportModal()">+ Add Daily Report</button>`:''}
    </div>`;

  return filterBar + mbs.map(mb=>{
    let reps = APP.reports.filter(r=>r.mbId===mb.id).sort((a,b)=>b.date.localeCompare(a.date));
    if(APP.reportFilter) reps = reps.filter(r=>r.date===APP.reportFilter);

    const monthReps = APP.reports.filter(r=>r.mbId===mb.id&&r.date.startsWith(monthKey));
    const mSpend = monthReps.reduce((s,r)=>s+r.spend,0);
    const mLeads = monthReps.reduce((s,r)=>s+r.leads,0);
    const mCpl = mLeads ? +(mSpend/mLeads).toFixed(2) : 0;

    const filterLabel = APP.reportFilter ? ` — ${fmtDate(APP.reportFilter)}` : ' — All time';

    return `<div class="card" style="margin-bottom:18px">
      <div class="card-h">
        <div style="display:flex;align-items:center;gap:11px">${av(mb.id,32)}<div><div style="font-size:14px;font-weight:700">${mb.name}</div><div style="font-size:11px;color:var(--muted)">This month: ${monthReps.length} reports</div></div></div>
        <div style="display:flex;gap:18px">
          <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Month spend</div><div style="font-size:17px;font-weight:800">$${mSpend}</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Month leads</div><div style="font-size:17px;font-weight:800">${mLeads}</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Avg CPL</div><div style="font-size:17px;font-weight:800;color:var(--accent)">$${mCpl||'—'}</div></div>
        </div>
      </div>
      <div class="card-h" style="background:var(--s50);padding:9px 16px">
        <div style="font-size:11px;font-weight:700;color:var(--sub)">${reps.length} report${reps.length!==1?'s':''} shown${filterLabel}</div>
        ${reps.length?`<div style="font-size:11px;color:var(--muted)">Total: $${reps.reduce((s,r)=>s+r.spend,0)} spend · ${reps.reduce((s,r)=>s+r.leads,0)} leads · avg CPL $${reps.length&&reps.reduce((s,r)=>s+r.leads,0)?+(reps.reduce((s,r)=>s+r.spend,0)/reps.reduce((s,r)=>s+r.leads,0)).toFixed(2):'—'}</div>`:''}
      </div>
      <div class="tw"><table>
        <thead><tr><th>Date</th><th>Product</th><th>Spend ($)</th><th>Leads</th><th>CPL ($)</th>${isMB?'<th></th>':''}</tr></thead>
        <tbody>
          ${reps.length?reps.map(r=>`<tr>
            <td>${fmtDate(r.date)}</td>
            <td><b>${pr(r.productId)?.name||'—'}</b></td>
            <td>$${r.spend}</td>
            <td>${r.leads}</td>
            <td><b style="color:${r.cpl<=2?'var(--ok)':r.cpl<=4?'var(--warn)':'var(--bad)'}">$${r.cpl}</b></td>
            ${isMB?`<td><button class="btn btn-ghost btn-xs" onclick="deleteReport(${r.id})">Delete</button></td>`:''}
          </tr>`).join(''):`<tr><td colspan="${isMB?6:5}"><div class="empty" style="padding:22px"><div class="empty-t" style="font-size:13px">No reports${APP.reportFilter?' for this date':''}</div></div></td></tr>`}
        </tbody>
      </table></div>
    </div>`;
  }).join('');
}

function tpImgGrid(){ document.getElementById('tpimgs').innerHTML=_tpFormImgs.map((s,i)=>`<div class="imw"><img src="${s}"><div class="x" onclick="rmTpImg(${i})">✕</div></div>`).join(''); }

async function delTestProduct(id){
  const name=APP.testProducts.find(p=>p.id===id)?.name||'product';

function toggleTpMB(mbId){
  const el=document.getElementById('tpmb_'+mbId);
  el.classList.toggle('on');
  const cur=JSON.parse(document.getElementById('tp_mbs').value||'[]');
  const idx=cur.indexOf(mbId);
  if(idx>=0)cur.splice(idx,1); else cur.push(mbId);
  document.getElementById('tp_mbs').value=JSON.stringify(cur);
}

async function saveTestProduct(editId){
  const name=document.getElementById('tp_name')?.value?.trim();
  const url=document.getElementById('tp_url')?.value?.trim();
  const market=document.getElementById('tp_market')?.value;
  const lang=document.getElementById('tp_lang')?.value;
  const notes=document.getElementById('tp_notes')?.value?.trim();
  const assignedMBs=JSON.parse(document.getElementById('tp_mbs')?.value||'[]');
  const status=document.getElementById('tp_status')?.value||'testing';
  const images=[..._tpFormImgs];
  if(!name||!url){ alert('Name and URL required.'); return; }
  if(editId==='null'||editId===null){
    const row={name,url,market,lang,notes,assigned_mbs:assignedMBs,status,test_results:[],images};
    const { data } = await sb.from('test_products').insert([row]).select().single();
    if(data) APP.testProducts.push(rowToTestProduct(data));
    await logHistory('created','testproduct',data?.id||0,`Added test product "${name}" (${market}) — assigned to ${assignedMBs.map(id=>APP.users[id]?.name).join(', ')||'no one'}`);
  } else {
    const tp=APP.testProducts.find(p=>p.id===editId);
    if(tp){ tp.name=name;tp.url=url;tp.market=market;tp.lang=lang;tp.notes=notes;tp.assignedMBs=assignedMBs;tp.status=status;tp.images=images; }
    await sb.from('test_products').update({name,url,market,lang,notes,assigned_mbs:assignedMBs,status,images}).eq('id',editId);
    await logHistory('updated','testproduct',editId,`Edited test product "${name}" — status: ${status}`);
  }
  _tpFormImgs=[];
  closeM2(); render();
}

function openTestResultModal(tpId){

  if(!tp)return;
  const today=todayYMD();
  document.getElementById('md1').innerHTML=`
  <div class="mh"><div><div class="mt">Log Test Result</div><div class="ms">${tp.name} · ${tp.market}</div></div><button class="btn btn-out btn-sm" onclick="closeM1()">✕</button></div>

    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div class="fg" style="flex:1;min-width:120px"><label class="fl">Spend ($) <span class="rq">*</span></label><input class="fi" id="tr_spend" type="number" min="0" step="0.01" placeholder="0.00" oninput="calcTestCpl()"></div>
      <div class="fg" style="flex:1;min-width:120px"><label class="fl">Leads <span class="rq">*</span></label><input class="fi" id="tr_leads" type="number" min="1" placeholder="0" oninput="calcTestCpl()"></div>

      <div id="tcplOut" style="font-size:28px;font-weight:800;color:var(--accent)">$—</div>
    </div>
    <div class="fg" style="margin-top:14px"><label class="fl">Notes</label><textarea class="fi" id="tr_notes" placeholder="How did the creative perform? Any observations..."></textarea></div>
  </div>
  <div class="mf"><button class="btn btn-out" onclick="closeM1()">Cancel</button><button class="btn btn-pri" onclick="saveTestResult(${tpId})">Save Result</button></div>`;

function calcTestCpl(){
  const s=parseFloat(document.getElementById('tr_spend')?.value||0);
  const l=parseFloat(document.getElementById('tr_leads')?.value||0);
  const out=document.getElementById('tcplOut');
  if(out) out.textContent=(s>0&&l>0)?'$'+(s/l).toFixed(2):'$—';
}

async function saveTestResult(tpId){
  const tp=APP.testProducts.find(p=>p.id===tpId);
  if(!tp)return;
  const date=document.getElementById('tr_date')?.value;
  const spend=parseFloat(document.getElementById('tr_spend')?.value);
  const leads=parseInt(document.getElementById('tr_leads')?.value);
  const notes=document.getElementById('tr_notes')?.value?.trim();
  if(!date||!(spend>=0)||!(leads>0)){alert('Fill all required fields.');return;}
  if(!tp.testResults)tp.testResults=[];
  tp.testResults.push({date,spend,leads,cpl:+(spend/leads).toFixed(2),notes,mbId:APP.me});
  await sb.from('test_products').update({test_results:tp.testResults}).eq('id',tpId);
  closeM1(); render();
}

function pgStats(){

    {id:'spend',label:'Total spend'},

  const filterBar = `

        <button class="btn btn-ghost btn-sm" onclick="APP.statsFilter.from='${todayYMD().slice(0,7)}-01';APP.statsFilter.to='${todayYMD()}';render()">This month</button>
        ${(f.from||f.to)?`<button class="btn btn-ghost btn-sm" onclick="APP.statsFilter.from='';APP.statsFilter.to='';render()">Clear</button>`:''}
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px">Show KPIs</div>

  const mbRows = mbs.map(mb=>{

    {k:'dlrespect',h:'Deadline %',v:r=>r.dlRespect+'%'},
  ];
  const mbCols=[

    {k:'cpl',h:'Avg CPL',v:r=>'$'+(r.avgCpl||'—')},
    {k:'leads',h:'Leads',v:r=>r.totalLeads},
    {k:'spend',h:'Spend',v:r=>'$'+r.totalSpend},

  const activeMbCols=mbCols.filter(c=>f.kpis.includes(c.k));

  // Global totals
  const totalVideos=veRows.reduce((s,r)=>s+r.totalVideos,0);

  const totalWinnersVE=veRows.reduce((s,r)=>s+r.winners,0);

  return filterBar + `

    ${f.kpis.includes('winners')?`<div class="kpi"><div class="kpi-l">Total winners</div><div class="kpi-v kpi-pos">${totalWinnersVE}</div><div class="kpi-s">Winning creatives found</div></div>`:''}
    ${f.kpis.includes('dlrespect')?`<div class="kpi"><div class="kpi-l">Avg deadline respect</div><div class="kpi-v ${avgDl>=80?'kpi-pos':avgDl>=50?'kpi-warn':'kpi-neg'}">${avgDl}%</div><div class="kpi-s">Team average</div></div>`:''}
    ${f.kpis.includes('cpl')?`<div class="kpi"><div class="kpi-l">Global avg CPL</div><div class="kpi-v">$${globalCpl||'—'}</div><div class="kpi-s">${totalLeads} leads total</div></div>`:''}
    ${f.kpis.includes('leads')?`<div class="kpi"><div class="kpi-l">Total leads</div><div class="kpi-v">${totalLeads}</div><div class="kpi-s">Across ${mbs.length} media buyers</div></div>`:''}
    ${f.kpis.includes('spend')?`<div class="kpi"><div class="kpi-l">Total spend</div><div class="kpi-v">$${totalSpend}</div><div class="kpi-s">Logged in reports</div></div>`:''}

      <div class="card-h"><div class="card-t">Video Editors</div></div>

        <thead><tr><th>Editor</th>${activeVeCols.map(c=>`<th>${c.h}</th>`).join('')}</tr></thead>
        <tbody>${veRows.length?veRows.map(r=>`<tr class="clickable" onclick="APP.dashUser='${r.id}';go('dashboard')">
          <td><div style="display:flex;align-items:center;gap:8px">${av(r.id,24)}<b>${r.name}</b></div></td>
          ${activeVeCols.map(c=>`<td>${c.v(r)}</td>`).join('')}
        </tr>`).join(''):`<tr><td colspan="${activeVeCols.length+1}"><div class="empty" style="padding:20px"><div class="empty-t" style="font-size:13px">No data</div></div></td></tr>`}</tbody>
      </table></div>
    </div>

      <div class="card-h"><div class="card-t">Media Buyers</div></div>
      <div class="tw"><table>
        <thead><tr><th>Buyer</th>${activeMbCols.map(c=>`<th>${c.h}</th>`).join('')}</tr></thead>
        <tbody>${mbRows.length?mbRows.map(r=>`<tr class="clickable" onclick="APP.dashUser='${r.id}';go('dashboard')">

      </table></div>
    </div>

  if(f.to)     rows = rows.filter(h=>h.at.slice(0,10)<=f.to);

  const actionChip = a => a==='created'?chip('Created','ok'):a==='deleted'?chip('Deleted','b'):chip('Updated','w');
  const entityChip = e => chip(e.charAt(0).toUpperCase()+e.slice(1),'n');

  return `

          </select>
        </div>
        <div style="min-width:140px">
          <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px">Entity</div>
          <select class="fi" style="padding:6px 10px;font-size:12px" onchange="APP.historyFilter.entity=this.value;render()">
            <option value="">All types</option>
            ${['task','product','testproduct','user','report'].map(e=>`<option value="${e}" ${f.entity===e?'selected':''}>${e.charAt(0).toUpperCase()+e.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px">From date</div>
          <input type="date" class="fi" style="width:auto;padding:6px 10px;font-size:12px" value="${f.from}" onchange="APP.historyFilter.from=this.value;render()">

        <div style="margin-left:auto;font-size:12px;color:var(--muted)">${rows.length} of ${APP.history.length} entries</div>
      </div>
    </div>
  </div>

  <div class="card"><div class="tw"><table>
    <thead><tr><th>When</th><th>User</th><th>Action</th><th>Type</th><th>Details</th></tr></thead>

      ${rows.length?rows.slice(0,200).map(h=>`<tr>
        <td style="white-space:nowrap;font-size:12px">${fmtDateTime(h.at)}</td>

    </tbody>
  </table></div></div>`;
}

function openTask(id){
  const t=tk(id); if(!t)return;
  const variants = t.variants && t.variants.length ? t.variants.map(v=>({...v})) : [{hook:t.hook||'',videoLink:t.videoLink||'',mbResult:t.mbResult||'pending',mbFeedback:t.mbFeedback||'',uploadedAt:t.uploadedAt||null}];
  APP.selTask=JSON.parse(JSON.stringify({...t, variants}));
  const p=pr(t.productId)||APP.testProducts.find(x=>x.id===t.testProductId);
  const me=u();
  const canVE=me.role==='video_editor'&&t.assignedVE===APP.me;
  const canMB=me.role==='media_buyer'&&t.assignedMB===APP.me;
  const isA=me.role==='admin';

function variantCard(v,i,canVE,canMB,isA,t){
  const deadlineYMD=(t.deadlineDate||'').slice(0,10);
  // Late = uploaded on a day AFTER the deadline day (local date comparison)
  const late = v.uploadedAt && deadlineYMD ? toYMD(new Date(v.uploadedAt)) > deadlineYMD : null;
  const revLate = v.revisionUploadedAt && deadlineYMD ? toYMD(new Date(v.revisionUploadedAt)) > deadlineYMD : null;
  const inRevision = v.mbResult==='needs_revision';
  const isApproved = v.mbResult==='approved';
  const borderColor = isApproved?'var(--ok-bd)':inRevision?'var(--warn-bd)':'var(--border)';
  const headerBg   = isApproved?'var(--ok-bg)':inRevision?'var(--warn-bg)':'var(--s50)';
  const statusLabel = isApproved?'&#10003; Approved':inRevision?'&#8634; Needs revision':v.videoLink?'Waiting for approval':'Pending upload';
  const rmBtn = (canVE||isA)&&i>0 ? '<button class="btn btn-ghost btn-xs" onclick="removeVariant('+i+')">Remove</button>' : '';
  const uploadInfo = v.uploadedAt ? '<div style="font-size:11px;margin-top:5px;color:var(--muted)">Uploaded '+fmtDateTime(v.uploadedAt)+' '+(late===true?'<span class="late">&middot; Late</span>':late===false?'<span class="ontime">&middot; On time</span>':'')+'</div>' : '';
  const videoOpenLink = v.videoLink ? '<a href="'+v.videoLink+'" target="_blank" style="display:inline-block;margin-top:5px;font-size:11px;color:var(--accent)">Open video &#8599;</a>' : '';
  let revisionBlock = '';
  if(inRevision){
    const feedbackDisplay = v.revisionFeedback ? '<div style="font-size:12px;color:var(--ink);margin-bottom:8px;line-height:1.5">'+escHtml(v.revisionFeedback)+'</div>' : '';
    const revUploadInfo = v.revisionUploadedAt ? '<div style="font-size:11px;margin-top:5px;color:var(--muted)">Revision uploaded '+fmtDateTime(v.revisionUploadedAt)+' '+(revLate===true?'<span class="late">&middot; Late</span>':revLate===false?'<span class="ontime">&middot; On time</span>':'')+'</div>' : '';
    const veRevInput = canVE||isA ? '<label class="fl" style="color:var(--warn)">Upload revised video link</label><input class="fi" data-vfield="revisionLink" data-vidx="'+i+'" value="'+(v.revisionLink||'')+'" placeholder="https://drive.google.com/... (revised version)">'+revUploadInfo : '<div style="font-size:12px;color:var(--muted)">Waiting for editor to upload revised version.</div>';
    revisionBlock = '<div style="padding:11px;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:8px;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--warn);margin-bottom:4px">&#8634; Revision requested</div>'+feedbackDisplay+veRevInput+'</div>';
  }
  const revisedLink = v.revisionLink&&!inRevision ? '<div style="padding:9px 12px;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:8px;margin-bottom:10px;font-size:12px"><b>Revised:</b> <a href="'+v.revisionLink+'" target="_blank" style="color:var(--accent)">Open &#8599;</a></div>' : '';
  let reviewBlock = '';
  if(!v.videoLink){
    reviewBlock = '<div class="al al-i" style="margin-bottom:0"><i>&#9711;</i><div>Waiting for video link from editor.</div></div>';
  } else if(canMB||isA){
    // ── Section 1: Production review (Approve / Needs revision) ──
    const approveBtn = '<button class="btn btn-sm '+(isApproved?'btn-pri':'btn-out')+'" type="button" onclick="setVariantResult('+i+',\'approved\')">&#10003; Approve</button>';
    const revisionBtn = '<button class="btn btn-sm '+(inRevision?'btn-bad':'btn-out')+'" type="button" onclick="setVariantResult('+i+',\'needs_revision\')">&#8634; Needs revision</button>';
    const resetBtn = (isApproved||inRevision) ? '<button class="btn btn-ghost btn-sm" type="button" onclick="setVariantResult('+i+',\'pending\')">Reset</button>' : '';
    const revisionFeedbackField = inRevision
      ? '<div class="fg" style="margin-bottom:0"><label class="fl" style="color:var(--warn)">Revision feedback <span style="font-weight:400;color:var(--muted)">(explain what to fix)</span></label><textarea class="fi" data-vfield="revisionFeedback" data-vidx="'+i+'" rows="2" placeholder="e.g. Show product in first 3 sec, add subtitle...">'+escHtml(v.revisionFeedback||'')+'</textarea></div>'
      : '';
    const generalFeedback = !inRevision
      ? '<div class="fg" style="margin-bottom:0"><label class="fl">Feedback of this video version</label><textarea class="fi" data-vfield="mbFeedback" data-vidx="'+i+'" rows="2" placeholder="Optional feedback on this video version...">'+escHtml(v.mbFeedback||'')+'</textarea></div>'
      : '';

    // ── Section 2: Ad performance (Winner / Loser / Pending) — shown to all ──
    const adResult = v.adResult||'pending';
    const winnerBtn = '<button class="btn btn-sm '+(adResult==='winner'?'btn-pri':'btn-out')+'" type="button" onclick="setVariantAdResult('+i+',\'winner\')">Winner</button>';
    const loserBtn  = '<button class="btn btn-sm '+(adResult==='loser'?'btn-bad':'btn-out')+'"  type="button" onclick="setVariantAdResult('+i+',\'loser\')">Loser</button>';
    const pendingBtn= '<button class="btn btn-sm '+(adResult==='pending'?'on2':'btn-ghost')+'" type="button" onclick="setVariantAdResult('+i+',\'pending\')">Pending</button>';
    const adResultChip = adResult==='winner'?'<span class="chip chip-ok" style="font-size:10px">Winner</span>':adResult==='loser'?'<span class="chip chip-b" style="font-size:10px">Loser</span>':'';

    const adPerformanceBlock = '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
      +'<label class="fl">Ad performance result <span style="font-weight:400;color:var(--muted);font-size:10px">(after launching in ads)</span> '+adResultChip+'</label>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'+winnerBtn+loserBtn+pendingBtn+'</div>'
      +'</div>';

    reviewBlock = '<div style="margin-bottom:10px"><label class="fl">Production review</label>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+approveBtn+revisionBtn+resetBtn+'</div>'
      +'</div>'
      +revisionFeedbackField
      +generalFeedback
      +adPerformanceBlock;
  }
  return '<div class="card" style="margin-bottom:10px;border:1.5px solid '+borderColor+'">'
    +'<div class="card-h" style="padding:10px 14px;background:'+headerBg+'">'
    +'<div style="font-size:12px;font-weight:700;color:var(--ink)">Hook variant '+(i+1)+' &nbsp;<span style="font-weight:400;color:var(--muted)">'+statusLabel+'</span></div>'+rmBtn
    +'</div>'
    +'<div class="card-b" style="padding:13px 14px">'
    +'<div class="fg" style="margin-bottom:10px"><label class="fl">Hook text</label>'
    +'<input class="fi" data-vfield="hook" data-vidx="'+i+'" value="'+(v.hook||'').replace(/"/g,'&quot;')+'" placeholder="Hook for this variant..." '+((!canVE&&!isA)?'disabled':'')+'></div>'
    +'<div class="fg" style="margin-bottom:10px"><label class="fl">Video link</label>'
    +'<input class="fi" data-vfield="videoLink" data-vidx="'+i+'" value="'+(v.videoLink||'')+'" placeholder="https://drive.google.com/..." '+((!canVE&&!isA)?'disabled':'')+'>'
    +uploadInfo+videoOpenLink+'</div>'
    +revisionBlock+revisedLink+reviewBlock
    +'</div></div>';
}

function addVariant(){
  if(!APP.selTask.variants) APP.selTask.variants=[];
  if(APP.selTask.variants.length>=4) return;
  syncVariantsFromDOM();
  APP.selTask.variants.push({hook:'',videoLink:'',mbResult:'pending',mbFeedback:'',adResult:'pending',uploadedAt:null});
  renderTaskModalBody();
}
function removeVariant(i){
  syncVariantsFromDOM();
  APP.selTask.variants.splice(i,1);
  renderTaskModalBody();
}
function syncVariantsFromDOM(){
  document.querySelectorAll('[data-vfield]').forEach(el=>{
    const idx=parseInt(el.dataset.vidx);
    const field=el.dataset.vfield;
    if(APP.selTask.variants[idx]) APP.selTask.variants[idx][field]=el.value;
  });
}
function setVariantResult(i,r){
  syncVariantsFromDOM();
  APP.selTask.variants[i].mbResult=r;
  renderTaskModalBody();
}
function setVariantAdResult(i,r){
  syncVariantsFromDOM();
  APP.selTask.variants[i].adResult=r;
  renderTaskModalBody();
}
// Re-render only the variants list + add-button area from current APP.selTask (no data mutation)
function renderTaskModalBody(){
  const t=APP.selTask;
  const me=u();
  const canVE=me.role==='video_editor'&&t.assignedVE===APP.me;
  const canMB=me.role==='media_buyer'&&t.assignedMB===APP.me;
  const isA=me.role==='admin';
  document.getElementById('variantsWrap').innerHTML=t.variants.map((v,i)=>variantCard(v,i,canVE,canMB,isA,t)).join('');
  const addBtnWrap=document.getElementById('addVariantWrap');
  if(addBtnWrap) addBtnWrap.innerHTML=(canVE||isA)&&t.variants.length<4?`<button class="btn btn-ghost btn-sm" onclick="addVariant()" style="margin-bottom:8px">+ Add another hook variant (${t.variants.length}/4)</button>`:'';
}

async function saveTask(id){
  syncVariantsFromDOM();
  const t=tk(id);
  const mbNote=document.getElementById('tmbn')?.value?.trim();
  const angle=document.getElementById('tangle')?.value?.trim();
  const variants=APP.selTask.variants.map(v=>({...v}));

  // Auto-timestamp uploads
  variants.forEach(v=>{
    if(v.videoLink&&v.videoLink.trim()&&!v.uploadedAt) v.uploadedAt=new Date().toISOString();
    if(v.revisionLink&&v.revisionLink.trim()&&!v.revisionUploadedAt) v.revisionUploadedAt=new Date().toISOString();
  });

  // Auto-compute task status from variant results
  const variantsWithVideo = variants.filter(v=>v.videoLink);
  let autoStatus = 'pending'; // no video uploaded at all
  if(variantsWithVideo.length>0){
    const allApproved = variantsWithVideo.every(v=>v.mbResult==='approved');
    const anyRevision = variantsWithVideo.some(v=>v.mbResult==='needs_revision');
    const allPending  = variantsWithVideo.every(v=>!v.mbResult||v.mbResult==='pending');
    if(allApproved) autoStatus='approved';
    else if(anyRevision) autoStatus='in_revision';
    else if(allPending) autoStatus='done'; // uploaded, waiting for MB review
    else autoStatus='done'; // mixed — some reviewed some not
  }
  // Allow manual status override only if admin (auto is default for MB/VE)
  const manualSt=document.getElementById('tst')?.value;
  const me=u();
  const st = me.role==='admin' && manualSt ? manualSt : autoStatus;

  const patch={ status:st, variants };
  if(mbNote!==undefined) patch.mbNote=mbNote;
  if(angle) patch.angle=angle;
  await updTask(id, patch);
  await logHistory('updated','task',id,`Updated task for ${pr(t.productId)?.name||t.testProductName||'product'} — status: ${st}`);
  closeM1(); render();
}
async function delTask(id){
  const t=tk(id); if(!t)return;
  if(!confirm('Delete this task permanently? This cannot be undone.')) return;
  const name=pr(t.productId)?.name||t.testProductName||'product';
  APP.tasks=APP.tasks.filter(x=>x.id!==id);
  await sb.from('tasks').delete().eq('id',id);
  await logHistory('deleted','task',id,`Deleted task for "${name}" (${t.taskDate})`);
  closeM1(); render();
}
function openTaskEdit(id){
  const t=tk(id); if(!t)return;
  // Open the create modal, pre-filled with the task's data, then override the action button to update
  openTaskCreate();
  // Pre-fill after modal is open
  setTimeout(()=>{
    if(t.isTest){
      setTaskMode('testing');
      if(document.getElementById('c_testprod')) document.getElementById('c_testprod').value=t.testProductId;
    } else {
      setTaskMode('scaling');
      if(document.getElementById('c_prod')) document.getElementById('c_prod').value=t.productId;
      // trigger angle/hook load for this product
      const evt = new Event('change');
      document.getElementById('c_prod')?.dispatchEvent(evt);
    }
    if(document.getElementById('c_date'))  document.getElementById('c_date').value = t.taskDate;
    if(document.getElementById('c_type'))  document.getElementById('c_type').value = t.videoType;
    if(document.getElementById('c_camp'))  document.getElementById('c_camp').value = t.campaignType;
    if(document.getElementById('c_voice')) document.getElementById('c_voice').value = t.voiceOver;
    if(document.getElementById('c_mbnote')) document.getElementById('c_mbnote').value = t.mbNote||'';
    if(document.getElementById('c_ve'))    document.getElementById('c_ve').value = t.assignedVE;
    // Update VE pill selection
    document.querySelectorAll('[id^="ve_"]').forEach(b=>b.classList.toggle('on', b.id==='ve_'+t.assignedVE));
    // Change the Assign button to Update
    const assignBtn = document.querySelector('#md2 .btn-pri');
    if(assignBtn){ assignBtn.textContent='Update task'; assignBtn.onclick=()=>updateTask(id); }
    // Update modal subtitle
    const ms = document.querySelector('#md2 .ms');
    if(ms) ms.textContent=`Editing task — ${fmtDate(t.taskDate)}`;
  }, 100);
}
async function updateTask(id){
  const t=tk(id); if(!t)return;
  const type=document.getElementById('c_type')?.value;
  const camp=document.getElementById('c_camp')?.value;
  const taskDate=document.getElementById('c_date')?.value;
  const voice=document.getElementById('c_voice')?.value;
  const veId=document.getElementById('c_ve')?.value;
  const mbNote=document.getElementById('c_mbnote')?.value?.trim()||'';
  if(!veId||!taskDate){ alert('Fill all required fields.'); return; }
  const d=new Date(taskDate+'T00:00:00');
  const patch={ taskDate, day:dayName(d), assignedVE:veId, videoType:type, campaignType:camp, voiceOver:voice, mbNote, deadlineDate:taskDate };
  await updTask(id, patch);
  await logHistory('updated','task',id,`Edited task for "${pr(t.productId)?.name||t.testProductName||'product'}"`);
  closeM2(); render();
}
async function sendRevision(id){
  const note=document.getElementById('trn')?.value?.trim();
  if(!note){ alert('Describe what needs to be revised.'); return; }
  syncVariantsFromDOM();
  const t=tk(id);
  await updTask(id,{status:'in_revision',revisionNote:note,variants:APP.selTask.variants.map(v=>({...v}))});
  await logHistory('updated','task',id,`Sent task back for revision — ${pr(t.productId)?.name||t.testProductName||'product'}`);
  closeM1(); render();
}

function enforceHookLimit(box){
  const checked=document.querySelectorAll('.c_hookbox:checked');
  if(checked.length>4){ box.checked=false; }
  if(checked.length===0){ box.checked=true; } // keep at least 1
  updateHookCountWarn();

function addTestHookField(){

async function createTask(){
  const me=u();
  const mbId=me.role==='admin'?document.getElementById('c_mb')?.value:APP.me;
  const veId=document.getElementById('c_ve')?.value;
  const type=document.getElementById('c_type')?.value;
  const camp=document.getElementById('c_camp')?.value;
  const taskDate=document.getElementById('c_date')?.value;
  const voice=document.getElementById('c_voice')?.value;
  const mode=document.getElementById('c_mode')?.value||'scaling';
  const mbNote=document.getElementById('c_mbnote')?.value?.trim()||'';
  if(!veId||!taskDate){ alert('Fill all required fields.'); return; }

  const d=new Date(taskDate+'T00:00:00');
  const day=dayName(d);
  let taskObj = {
    id:APP.taskSeq++, taskDate, day,
    assignedMB:mbId, assignedVE:veId,
    campaignType:camp, videoType:type, voiceOver:voice,
    status:'pending',
    revisionNote:'',
    mbNote,
    managerApproval:'pending',
    deadlineDate: taskDate, // plain YYYY-MM-DD, same as taskDate — deadline = end of this day (23:59:59 local)
    isTest: mode==='testing',
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
  };

  if(mode==='testing'){
    const tpId=parseInt(document.getElementById('c_testprod')?.value);
    const tp=APP.testProducts.find(p=>p.id===tpId);
    const angle=document.getElementById('c_testangle')?.value?.trim()||'Test creative';
    const hookInputs=[...document.querySelectorAll('#c_testhooks input')].map(i=>i.value.trim()).filter(Boolean);
    const hooks=hookInputs.length?hookInputs:['—'];
    if(!tp){ alert('Select a test product.'); return; }
    const variants=hooks.map(h=>({hook:h,videoLink:'',mbResult:'pending',mbFeedback:'',uploadedAt:null}));
    taskObj={...taskObj, testProductId:tpId, testProductName:tp.name, testMarket:tp.market, productId:null, angle, variants};
  } else {
    const pid=parseInt(document.getElementById('c_prod')?.value);
    const angle=document.getElementById('c_angle')?.value;
    const hooks=[...document.querySelectorAll('.c_hookbox:checked')].map(b=>b.value);
    if(!pid||!angle||!hooks.length){ alert('Select a product, angle and at least one hook.'); return; }
    const variants=hooks.map(h=>({hook:h,videoLink:'',mbResult:'pending',mbFeedback:'',uploadedAt:null}));
    taskObj={...taskObj, productId:pid, testProductId:null, angle, variants};
  }

  APP.tasks.push(taskObj);
  // Persist to Supabase
  const { data: inserted } = await sb.from('tasks').insert([taskToRow(taskObj)]).select().single();
  if(inserted){ taskObj.id=inserted.id; APP.tasks[APP.tasks.length-1].id=inserted.id; }
  await logHistory('created','task',taskObj.id,`Assigned task: ${pr(taskObj.productId)?.name||taskObj.testProductName||'product'} — ${taskObj.variants.length} hook(s) — to ${APP.users[veId]?.name}`);
  closeM2(); render();
}

function calcCpl(){
  const s=parseFloat(document.getElementById('r_spend')?.value||0);
  const l=parseFloat(document.getElementById('r_leads')?.value||0);
  const out=document.getElementById('cplOut');
  out.textContent = (s>0&&l>0)?'$'+(s/l).toFixed(2):'$—';
}
async function saveReport(){
  const me=u();
  const rawPid=document.getElementById('r_prod').value;
  const isTest=rawPid.startsWith('t_');
  const pid=parseInt(rawPid.slice(2));
  const date=document.getElementById('r_date').value;
  const spend=parseFloat(document.getElementById('r_spend').value);
  const leads=parseInt(document.getElementById('r_leads').value);
  if(!rawPid||!date||!(spend>=0)||!(leads>0)){ alert('Fill all fields. Leads must be greater than 0.'); return; }

  if(isTest){
    const tp=APP.testProducts.find(p=>p.id===pid);
    if(!tp)return;
    if(!tp.testResults)tp.testResults=[];
    tp.testResults.push({date,spend,leads,cpl:+(spend/leads).toFixed(2),notes:'',mbId:me.id});
    await sb.from('test_products').update({test_results:tp.testResults}).eq('id',pid);
    await logHistory('created','report',pid,`${me.name} logged test result for "${tp.name}" — $${spend} spend, ${leads} leads`);
  } else {
    const { data } = await sb.from('reports').insert([{mb_id:me.id,product_id:pid,date,spend,leads,cpl:+(spend/leads).toFixed(2)}]).select().single();
    if(data) APP.reports.push({id:data.id,mbId:me.id,productId:pid,date,spend,leads,cpl:data.cpl});
    await logHistory('created','report',data?.id||0,`${me.name} logged report for "${pr(pid)?.name||'product'}" — $${spend} spend, ${leads} leads`);
  }
  closeM1(); render();
}
async function deleteReport(id){
  if(!confirm('Delete this report?'))return;
  const r=APP.reports.find(x=>x.id===id);
  APP.reports=APP.reports.filter(x=>x.id!==id);
  await sb.from('reports').delete().eq('id',id);
  if(r) await logHistory('deleted','report',id,`Deleted report for "${pr(r.productId)?.name||'product'}" dated ${r.date}`);
  render();
}

function userRoleChange(){
  const r=document.getElementById('u_role').value;
  document.getElementById('u_mbExtra').style.display=r==='media_buyer'?'block':'none';
  // Auto-set default permissions for the chosen role
  const allPerms=['dashboard','tasks','products','team','reports','pointage','testproducts','stats','history'];
  const defaults={video_editor:['dashboard','tasks','products','testproducts'], media_buyer:['dashboard','tasks','products','reports','testproducts'], product_lister:['products','testproducts'], admin:allPerms};
  const on = defaults[r]||['products'];
  allPerms.forEach(p=>{
    const el=document.getElementById('perm_'+p);
    if(el){ if(on.includes(p)) el.classList.add('on'); else el.classList.remove('on'); }

async function saveUser(uid){
  const allPerms=['dashboard','tasks','products','team','reports','pointage','testproducts','stats','history'];
  const name=document.getElementById('u_name').value.trim();
  const email=document.getElementById('u_email').value.trim().toLowerCase();
  const pwd=document.getElementById('u_pwd').value;
  const role=document.getElementById('u_role').value;
  const ve=document.getElementById('u_ve')?.value||null;
  const perms={}; allPerms.forEach(p=>{ const el=document.getElementById('perm_'+p); perms[p]=el&&el.classList.contains('on')?1:0; });
  if(!name||!email){ alert('Name and email required.'); return; }
  if(uid==='null'||uid===null){
    const id=document.getElementById('u_id').value.trim();
    if(!id){ alert('User ID required.'); return; }
    if(APP.users[id]){ alert('User ID already exists.'); return; }
    if(!pwd||pwd.length<6){ alert('Password must be at least 6 characters.'); return; }
    const av=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const newUser={id,name,role,av,email,pwd,products:[],ve:role==='media_buyer'?(ve||null):null,active:true,perms};
    await sb.from('users').insert([newUser]);
    APP.users[id]=newUser;
    AV[id]='#'+Math.floor(Math.random()*8388607+4194304).toString(16);
    await logHistory('created','user',id,`Created user ${name} (${role.replace('_',' ')})`);
  } else {
    const x=APP.users[uid];
    const changes=[];
    if(x.name!==name)changes.push(`name → "${name}"`);
    if(x.email!==email)changes.push(`email → "${email}"`);
    if(x.role!==role)changes.push(`role → "${role}"`);
    const upd={name,email,role,perms};
    if(pwd&&pwd.length>=6){upd.pwd=pwd;changes.push('password changed');}
    if(role==='media_buyer')upd.ve=ve;
    await sb.from('users').update(upd).eq('id',uid);
    x.name=name;x.email=email;x.role=role;x.perms=perms;
    if(pwd&&pwd.length>=6)x.pwd=pwd;
    if(role==='media_buyer')x.ve=ve;
    await logHistory('updated','user',uid,`Edited user ${name}${changes.length?' — '+changes.join(', '):''}`);
  }
  closeM2(); render();
}
async function toggleUser(id){
  APP.users[id].active=!APP.users[id].active;
  await sb.from('users').update({active:APP.users[id].active}).eq('id',id);
  await logHistory('updated','user',id,`${APP.users[id].active?'Activated':'Deactivated'} user ${APP.users[id].name}`);
  render();
}
async function delUser(id){
  if(id==='youssef'){alert('Cannot delete the admin.');return;}
  if(!confirm('Delete '+APP.users[id].name+'? This cannot be undone.'))return;
  const name=APP.users[id].name;
  delete APP.users[id];
  await sb.from('users').delete().eq('id',id);
  await logHistory('deleted','user',id,`Deleted user ${name}`);
  render();
}

function toggleAssignProd(pid){
  const idx=_assignSel.indexOf(pid);
  const card=document.getElementById('apcard_'+pid);
  const chk=document.getElementById('apchk_'+pid);
  if(idx>=0){ _assignSel.splice(idx,1); card.style.borderColor='var(--border)'; card.style.background='#fff'; chk.checked=false; }
  else { _assignSel.push(pid); card.style.borderColor='var(--accent)'; card.style.background='var(--accent-bg)'; chk.checked=true; }
  updateAssignUI();
}
function toggleSelectAllProd(allIds){
  const allChecked=document.getElementById('assignSelectAll').checked;
  _assignSel = allChecked ? [...allIds] : [];
  allIds.forEach(pid=>{
    const card=document.getElementById('apcard_'+pid);
    const chk=document.getElementById('apchk_'+pid);
    if(card&&chk){
      chk.checked=allChecked;
      card.style.borderColor=allChecked?'var(--accent)':'var(--border)';
      card.style.background=allChecked?'var(--accent-bg)':'#fff';
    }
  });
  updateAssignUI();
}
function updateAssignUI(){
  const n=_assignSel.length;
  const lbl=document.getElementById('assignCountLabel'); if(lbl) lbl.textContent=`${n} selected`;
  const btn=document.getElementById('assignSaveBtn');
  if(btn){ btn.disabled = n===0; btn.textContent = `Assign ${n} product(s)`; }
}
async function saveAssignedProds(mbId){
  if(!_assignSel.length) return;
  const mb=APP.users[mbId];
  _assignSel.forEach(pid=>{ if(!mb.products.includes(pid)) mb.products.push(pid); });
  await sb.from('users').update({products:mb.products}).eq('id',mbId);
  await logHistory('updated','user',mbId,`Assigned ${_assignSel.length} product(s) to ${mb.name}`);
  _assignSel=[];
  closeM2(); render();
}
async function addProd(mb,pid){ if(!APP.users[mb].products.includes(pid)){APP.users[mb].products.push(pid); await sb.from('users').update({products:APP.users[mb].products}).eq('id',mb);} }
async function rmProd(mb,pid){ APP.users[mb].products=APP.users[mb].products.filter(i=>i!==pid); await sb.from('users').update({products:APP.users[mb].products}).eq('id',mb); render(); }
